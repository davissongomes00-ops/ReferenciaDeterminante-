
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Premium | RD Logistics</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Urbanist', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #111; padding: 20px; border: 1px solid #333; margin-bottom: 20px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: #FF0000; color: white; padding: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { padding: 12px; border: 1px solid #222; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Painel Admin Premium</h1>

        <div class="card">
            <h3>Textos da Página (Home)</h3>
            <input type="text" id="site-titulo" placeholder="Título Principal (Hero)">
            <textarea id="site-subtitulo" placeholder="Subtítulo da Hero"></textarea>
            <button onclick="salvarTextosSite()">Atualizar Textos do Site</button>
        </div>

        <div class="card">
            <h3>Gestão de Mercadoria</h3>
            <input type="hidden" id="p-index">
            <input type="text" id="p-nome" placeholder="Nome do Produto">
            <input type="number" id="p-preco" placeholder="Preço">
            <textarea id="p-desc" placeholder="Especificações Técnicas"></textarea>
            <label>Trocar Foto:</label>
            <input type="file" id="upload-foto" accept="image/*" onchange="converterImagem()">
            <input type="hidden" id="p-foto-base64">
            <button onclick="salvarProduto()">Guardar Produto / Alterar</button>
        </div>

        <div class="card">
            <h3>Lista de Produtos</h3>
            <table>
                <thead><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ação</th></tr></thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Senha de Acesso
        window.onload = function() {
            const senha = "123"; 
            const entrada = prompt("Insira a senha de admin:");
            if (entrada !== senha) { alert("Acesso negado!"); window.location.href = "index.html"; }
            renderAdmin();
        };

        function converterImagem() {
            const file = document.getElementById('upload-foto').files[0];
            const reader = new FileReader();
            reader.onloadend = function() { document.getElementById('p-foto-base64').value = reader.result; }
            reader.readAsDataURL(file);
        }

        function salvarTextosSite() {
            localStorage.setItem("rd_site_titulo", document.getElementById('site-titulo').value);
            localStorage.setItem("rd_site_subtitulo", document.getElementById('site-subtitulo').value);
            alert("Textos atualizados!");
        }

        function salvarProduto() {
            let prods = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            let idx = document.getElementById('p-index').value;
            let novo = { 
                nome: document.getElementById('p-nome').value, 
                preco: parseFloat(document.getElementById('p-preco').value),
                descricao: document.getElementById('p-desc').value,
                foto: document.getElementById('p-foto-base64').value || ""
            };
            if(idx === "") { prods.push(novo); } else { prods[idx] = novo; }
            localStorage.setItem("rd_mercadorias", JSON.stringify(prods));
            renderAdmin();
        }

        function renderAdmin() {
            const prods = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            const tbody = document.getElementById("corpo-tabela");
            tbody.innerHTML = "";
            prods.forEach((p, i) => {
                tbody.innerHTML += `<tr>
                    <td><img src="${p.foto}" style="width:50px;height:50px;object-fit:cover;"></td>
                    <td>${p.nome}</td><td>${p.preco}€</td>
                    <td><button onclick="editar(${i})">Editar</button> 
                        <button onclick="remover(${i})" style="background:#550000">X</button></td>
                </tr>`;
            });
        }

        function editar(i) {
            let prods = JSON.parse(localStorage.getItem("rd_mercadorias"));
            document.getElementById('p-index').value = i;
            document.getElementById('p-nome').value = prods[i].nome;
            document.getElementById('p-preco').value = prods[i].preco;
            document.getElementById('p-desc').value = prods[i].descricao;
            document.getElementById('p-foto-base64').value = prods[i].foto;
        }

        function remover(i) {
            let prods = JSON.parse(localStorage.getItem("rd_mercadorias"));
            prods.splice(i, 1);
            localStorage.setItem("rd_mercadorias", JSON.stringify(prods));
            renderAdmin();
        }
    </script>
</body>
</html>
