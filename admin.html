<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Merchandise</title>
    <style>
        body { background: #050505; color: white; font-family: 'Urbanist', sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; }
        button { background: #FF0000; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #222; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Add/Edit Merchandise</h3>
        <input type="hidden" id="product-index">
        <input type="text" id="product-name" placeholder="Product Name">
        <input type="number" id="product-price" placeholder="Price">
        <textarea id="product-desc" placeholder="Technical Description"></textarea>
        
        <label>Product Image:</label>
        <input type="file" id="upload-photo" accept="image/*" onchange="convertToBase64()">
        <input type="hidden" id="product-photo">
        
        <button onclick="saveProduct()">Save Product</button>
    </div>

    <table>
        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Action</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        /**
         * Converts the uploaded image to Base64 and stores it in the hidden input.
         */
        function convertToBase64() {
            const file = document.getElementById('upload-photo').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('product-photo').value = reader.result;
            }
            reader.readAsDataURL(file);
        }

        /**
         * Saves or updates a product in localStorage.
         */
        function saveProduct() {
            let products = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            let index = document.getElementById('product-index').value;
            let product = {
                id: "p" + Date.now(),
                nome: document.getElementById('product-name').value,
                preco: parseFloat(document.getElementById('product-price').value),
                descricao: document.getElementById('product-desc').value,
                foto: document.getElementById('product-photo').value
            };

            if (isNaN(product.preco) || product.nome === "") {
                alert('Invalid product name or price.');
                return;
            }

            if (index === "") {
                products.push(product);
            } else {
                products[index] = product;
            }
            localStorage.setItem("rd_mercadorias", JSON.stringify(products));
            location.reload();
        }

        /**
         * Renders the list of products stored in localStorage.
         */
        function renderProductList() {
            const products = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = ''; 

            if (products.length === 0) {
                console.warn('The product list is empty.');
            }

            products.forEach((p, i) => {
                tbody.innerHTML += `<tr>
                    <td><img src="${p.foto}" width="50" height="50" style="object-fit:cover;"></td>
                    <td>${p.nome}</td><td>${p.preco}€</td>
                    <td><button onclick="editProduct(${i})">Edit</button></td>
                </tr>`;
            });
        }

        /**
         * Populates the form fields based on the product index.
         * * @param {number} index - Index of the product to be edited.
         */
        function editProduct(index) {
            const products = JSON.parse(localStorage.getItem("rd_mercadorias"));
            let p = products[index];
            document.getElementById('product-index').value = index;
            document.getElementById('product-name').value = p.nome;
            document.getElementById('product-price').value = p.preco;
            document.getElementById('product-desc').value = p.descricao;
            document.getElementById('product-photo').value = p.foto;
        }

        // Initial render call
        renderProductList();
    </script>
</body>
</html>
