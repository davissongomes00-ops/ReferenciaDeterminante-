<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Mercadorias</title>
    <style>
        body { background: #050505; color: white; font-family: 'Urbanist', sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; }
        button { background: #FF0000; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #222; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Adicionar/Editar Mercadoria</h3>
        <input type="hidden" id="p-index">
        <input type="text" id="p-nome" placeholder="Nome do Produto">
        <input type="number" id="p-preco" placeholder="Preço">
        <textarea id="p-desc" placeholder="Descrição Técnica"></textarea>
        
        <label>Foto do Produto:</label>
        <input type="file" id="upload-foto" accept="image/*" onchange="converterParaBase64()">
        <input type="hidden" id="p-foto">
        
        <button onclick="salvarProduto()">Guardar Produto</button>
    </div>

    <table>
        <thead><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ação</th></tr></thead>
        <tbody id="corpo-tabela"></tbody>
    </table>

    <script>
        /**
         * Converte a imagem carregada para Base64 e armazena no campo oculto.
         */
        function converterParaBase64() {
            const file = document.getElementById('upload-foto').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('p-foto').value = reader.result;
            }
            reader.readAsDataURL(file);
        }

        /**
         * Guarda ou edita um produto no localStorage.
         * 
         * @raises ValueError se o preço não for um número ou se a lista de produtos estiver vazia.
         */
        function salvarProduto() {
            let prods = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            let idx = document.getElementById('p-index').value;
            let p = {
                id: "p" + Date.now(),
                nome: document.getElementById('p-nome').value,
                preco: parseFloat(document.getElementById('p-preco').value),
                descricao: document.getElementById('p-desc').value,
                foto: document.getElementById('p-foto').value
            };

            if (isNaN(p.preco) || p.nome === "") {
                throw new ValueError('Nome do produto ou preço inválido.');
            }

            if (idx === "") {
                prods.push(p);
            } else {
                prods[idx] = p;
            }
            localStorage.setItem("rd_mercadorias", JSON.stringify(prods));
            location.reload();
        }

        /**
         * Renderiza a lista de produtos armazenados no localStorage.
         */
        function renderizarLista() {
            const prods = JSON.parse(localStorage.getItem("rd_mercadorias") || "[]");
            const tbody = document.getElementById("corpo-tabela");
            tbody.innerHTML = ''; // Limpa a tabela antes de renderizar
            if (prods.length === 0) {
                throw new ValueError('A lista de produtos está vazia.');
            }
            prods.forEach((p, i) => {
                tbody.innerHTML += `<tr>
                    <td><img src="${p.foto}" width="50" height="50" style="object-fit:cover;"></td>
                    <td>${p.nome}</td><td>${p.preco}€</td>
                    <td><button onclick="editar(${i})">Editar</button></td>
                </tr>`;
            });
        }

        /**
         * Edita um produto baseado no índice.
         * 
         * @param {number} i - Índice do produto a ser editado.
         */
        function editar(i) {
            const prods = JSON.parse(localStorage.getItem("rd_mercadorias"));
            let p = prods[i];
            document.getElementById('p-index').value = i;
            document.getElementById('p-nome').value = p.nome;
            document.getElementById('p-preco').value = p.preco;
            document.getElementById('p-desc').value = p.descricao;
            document.getElementById('p-foto').value = p.foto;
        }
        // Chamada inicial para renderizar a lista
        renderizarLista();
    </script>
</body>
</html>
