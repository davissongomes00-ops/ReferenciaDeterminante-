<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - RD Logistics</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="api-manager.js"></script>
</head>
<body>

    <div id="lista-checkout-itens"></div>
    <div id="total-checkout-val">0.00€</div>

    <button onclick="RD_API.processPayment()">PROCEED TO PAYMENT</button>

    <script>
        // Função de carregamento com tratamento de erro
        function loadCheckoutData() {
            try {
                const total = localStorage.getItem("rd_carrinho_total") || "0.00";
                document.getElementById("total-checkout-val").innerText = `${total}€`;
            } catch (error) {
                console.error("Load Error:", error);
            }
        }
        
        loadCheckoutData();
    </script>
</body>
</html>
