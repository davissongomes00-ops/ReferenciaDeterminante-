<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Logistics | Calculadora de Frete</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="js/api-manager.js"></script>
    <style>
        :root { --rd-red: #FF0000; --nexus-blue: #00d2ff; --dark-bg: #000000; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Urbanist'; padding-top: 120px; }
        .calc-container { max-width: 800px; margin: auto; padding: 40px; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; }
        h1 { font-family: 'Orbitron'; color: var(--nexus-blue); margin-top: 0; border-bottom: 2px solid #111; padding-bottom: 20px; }
        .grid-calc { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-family: 'Orbitron'; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; font-size: 1rem; }
        .result-box { margin-top: 30px; padding: 25px; background: #050505; border: 1px solid var(--rd-red); border-radius: 8px; text-align: center; }
        .final-price { font-size: 2.5rem; font-family: 'Orbitron'; color: var(--rd-red); display: block; }
        .btn-add { margin-top: 20px; width: 100%; padding: 15px; background: var(--rd-red); color: white; border: none; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<header style="padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FF0000; background: #050505; position: fixed; top: 0; width: 100%; z-index: 1000;">
    <div style="font-family: 'Orbitron'; color: #FF0000; font-size: 22px; font-weight: bold;">RD. LOGISTICS</div>
    <nav>
        <a href="index.html" style="color: white; text-decoration: none; margin-right: 20px;">E-Commerce</a>
        <a href="checkout.html" style="color: #25D366; text-decoration: none;">Checkout</a>
    </nav>
</header>

<div class="calc-container">
    <h1><i class="fa-solid fa-calculator"></i> Calculadora de Manifesto</h1>
    <div class="grid-calc">
        <div class="input-group">
            <label>DISTÂNCIA (KM)</label>
            <input type="number" id="distancia" value="0" oninput="calcularFrete()">
        </div>
        <div class="input-group">
            <label>PESO ESTIMADO (KG)</label>
            <input type="number" id="peso" value="0" oninput="calcularFrete()">
        </div>
    </div>
    <div class="input-group">
        <label>TIPO DE SERVIÇO</label>
        <select id="tipo" onchange="calcularFrete()">
            <option value="1.5">Logística Standard (1.5€/km)</option>
            <option value="2.5">Logística Express (2.5€/km)</option>
            <option value="4.0">Logística Especial (4.0€/km)</option>
        </select>
    </div>

    <div class="result-box">
        <label>CUSTO ESTIMADO DA OPERAÇÃO</label>
        <span class="final-price" id="total-calc">0.00€</span>
        <button class="btn-add" onclick="adicionarAoCarrinho()">ADICIONAR AO MANIFESTO</button>
    </div>
</div>

<script>
    function calcularFrete() {
        const dist = parseFloat(document.getElementById('distancia').value) || 0;
        const peso = parseFloat(document.getElementById('peso').value) || 0;
        const taxa = parseFloat(document.getElementById('tipo').value) || 1.5;
        const total = (dist * taxa) + (peso * 0.5); // 0.5 por kg
        document.getElementById('total-calc').innerText = total.toFixed(2) + "€";
    }

    function adicionarAoCarrinho() {
        const total = document.getElementById('total-calc').innerText.replace('€', '');
        if (parseFloat(total) <= 0) return alert("Calcule um valor válido.");
        
        let selecionados = RD_API.storage.get("rd_selecionados") || [];
        selecionados.push({ nome: "Serviço Logístico Personalizado", preco: parseFloat(total), qtd: 1 });
        RD_API.storage.set("rd_selecionados", selecionados);
        
        alert("Serviço adicionado ao manifesto!");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
