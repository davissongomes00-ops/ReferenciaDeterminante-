<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>RD Logistics | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <script src="js/api-manager.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Urbanist', sans-serif; margin: 0; padding-top: 120px; }
        /* Header c/ Esferas */
        .orbit-container { width: 80px; height: 35px; position: relative; border: 1px solid #222; }
        .orbit { position: absolute; border-radius: 50%; animation: orbit 3s infinite linear; }
        @keyframes orbit { from { transform: rotate(0deg) translateX(15px); } to { transform: rotate(360deg) translateX(15px); } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 20px; text-align: center; }
        .btn-buy { background: #FF0000; color: #fff; border: none; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <header style="position:fixed; top:0; width:100%; background:#050505; display:flex; justify-content:space-between; padding:20px; align-items:center; border-bottom:2px solid #FF0000;">
        <div style="font-family:'Orbitron'; font-size:20px;">RD. LOGISTICS</div>
        <div class="orbit-container"><div class="orbit" style="width:8px; height:8px; background:#FF0000;"></div></div>
        <nav><a href="checkout.html" style="color:#25D366; text-decoration:none;">CHECKOUT</a></nav>
    </header>

    <div class="grid" id="produtos-container"></div>

    <script>
        const produtos = [
            { id: 1, nome: "Placa Pladur", preco: 12.50 },
            { id: 2, nome: "Perfil 45mm", preco: 3.80 }
        ];

        function renderizar() {
            const container = document.getElementById('produtos-container');
            container.innerHTML = produtos.map(p => `
                <div class="card">
                    <h3>${p.nome}</h3>
                    <p>${p.preco}€</p>
                    <button class="btn-buy" onclick="adicionar(${p.preco}, '${p.nome}')">ADICIONAR</button>
                </div>
            `).join('');
        }

        function adicionar(preco, nome) {
            let cart = RD_API.storage.get("rd_selecionados") || [];
            cart.push({ nome, preco, qtd: 1 });
            RD_API.storage.set("rd_selecionados", cart);
            RD_API.storage.set("rd_carrinho_total", preco.toFixed(2));
            alert("Adicionado!");
        }
        renderizar();
    </script>
</body>
</html>
