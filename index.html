<!DOCTYPE html>
<html lang="pt-pt" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <title>RD Logistics | E-Commerce</title>
    </head>
<body>
    <header>...</header>

    <section class="hero">
        <h1 id="hero-titulo">REFERÊNCIA DETERMINANTE</h1>
        <p id="hero-sub">Selecione as mercadorias extras abaixo e avance diretamente para o fechamento do Checkout.</p>
    </section>
    
    <div class="main-layout">
        <div class="products-section">
            <h2 class="section-title">Mercadorias em Vitrine</h2>
            <div class="products-grid" id="grid-produtos"></div>
        </div>
        </div>

    <script>
        window.addEventListener('load', () => {
            const mapas = {
                "hero-titulo": "rd_titulo",
                "hero-sub": "rd_sub",
                "footer-text": "rd_footer"
            };
            for (const [id, key] of Object.entries(mapas)) {
                const valor = localStorage.getItem(key);
                const el = document.getElementById(id);
                if (valor && el) el.innerText = valor;
            }
        });
    </script>
</body>
<footer>
    <span id="footer-text">© 2026 RD Logistics. Todos os direitos reservados.</span>
</footer>
</html>
