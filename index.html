
<!DOCTYPE html>
<html lang="pt-pt" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Logistics | E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --rd-red: #FF0000; --nexus-blue: #00d2ff; --dark-bg: #000000; --card-bg: #0a0a0a; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Urbanist', sans-serif; padding-top: 100px; }
        .hero { text-align: center; padding: 40px 20px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: white; }
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; padding: 40px; max-width: 1200px; margin: auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center; }
        .btn-go-calc { display: block; background: var(--nexus-blue); color: black; text-align: center; padding: 15px; text-decoration: none; font-weight: bold; margin-top: 20px; border-radius: 6px; }
    </style>
</head>
<body>
    <header style="padding: 20px; border-bottom: 2px solid #FF0000; background: #050505; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;">
        <div style="color: #FF0000; font-weight: bold; font-family: 'Orbitron'; font-size: 20px;">RD. LOGISTICS</div>
        <nav>
            <a href="index.html" style="color: white; margin-right: 15px; text-decoration: none;">E-Commerce</a>
            <a href="calc.html" style="color: #00d2ff; text-decoration: none;">Calculadora</a>
        </nav>
    </header>

    <section class="hero">
        <h1>REFERÊNCIA DETERMINANTE</h1>
        <p>Selecione as mercadorias extras e avance para o Checkout.</p>
    </section>

    <div class="main-layout">
        <div class="products-grid" id="grid-produtos">
            </div>
        <div class="sidebar">
            <a href="/pagamento" class="btn-go-calc">AVANÇAR PARA CHECKOUT</a>
        </div>
    </div>
</body>
</html>
