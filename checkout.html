



    <!DOCTYPE html>
    <html lang="pt-pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RD Logistics | Pagamento Seguro</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
        <script src="https://js.stripe.com/v3/"></script>
        <style>
            :root { --rd-red: #FF0000; --nexus-blue: #00d2ff; --dark-bg: #000000; }
            body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Urbanist', sans-serif; padding-top: 110px; }
            .checkout-container { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 40px; max-width: 1200px; margin: auto; padding: 20px; }
            .box-billing { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 30px; }
            .box-billing h3 { font-family: 'Orbitron'; margin-top: 0; color: var(--nexus-blue); border-bottom: 1px solid #1c1c1c; padding-bottom: 10px; }
            
            .payment-methods { display: flex; gap: 20px; margin: 20px 0; }
            .method-btn { flex: 1; background: #0f0f0f; border: 1px solid #222; color: white; padding: 18px 15px; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s ease; position: relative; }
            .method-btn.active { border-color: var(--rd-red); background: rgba(255, 0, 0, 0.05); box-shadow: 0 0 15px rgba(255,0,0,0.1); }
            
            .logos-row { display: flex; gap: 8px; justify-content: center; align-items: center; }
            .form-group { margin-bottom: 20px; }
            .form-group label { display: block; font-size: 0.85rem; color: #888; font-family: 'Orbitron'; margin-bottom: 8px; }
            .form-input { width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; font-size:1rem; }
            .btn-pay-execute { width: 100%; background: #25D366; color: white; border: none; padding: 16px; border-radius: 6px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
            .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1c1c1c; font-size: 0.95rem; }
            #stripe-card-element { background: #111; padding: 16px; border-radius: 6px; border: 1px solid #333; margin-top: 5px; }
        </style>
    </head>
    <body>
    
<header style="padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FF0000; background: #050505; position: fixed; top: 0; width: 100%; z-index: 1000;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <a href="/" style="font-family: 'Orbitron', sans-serif; color: #FF0000; font-size: 22px; font-weight: bold; text-decoration: none; letter-spacing: 1px;">RD. LOGISTICS</a>
            <span style="font-family: 'Orbitron', sans-serif; font-size: 9px; color: #25D366; letter-spacing: 0.5px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; font-weight: bold; opacity: 0.85;">
                <span style="width: 6px; height: 6px; background: #25D366; border-radius: 50%; display: inline-block; animation: pulseGlow 1.5s infinite alternate;"></span>
                System Online | Secure Encrypted
            </span>
        </div>
        <div style="position: relative; width: 80px; height: 35px; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 4px; border: 1px solid #222; overflow: hidden;">
            <div style="position: absolute; border-radius: 50%; width: 8px; height: 8px; background: radial-gradient(circle, #FF0000 0%, #300000 100%); filter: drop-shadow(0 0 4px #FF0000); animation: orbitH1 3s infinite linear;"></div>
            <div style="position: absolute; border-radius: 50%; width: 6px; height: 6px; background: radial-gradient(circle, #00d2ff 0%, #002d3a 100%); filter: drop-shadow(0 0 4px #00d2ff); animation: orbitH2 4s infinite linear;"></div>
            <div style="position: absolute; border-radius: 50%; width: 5px; height: 5px; background: radial-gradient(circle, #fff 0%, #444 100%); filter: drop-shadow(0 0 3px #fff); animation: orbitH3 2.5s infinite linear;"></div>
        </div>
    </div>
    <style>
        @keyframes orbitH1 { 0% { transform: rotate(0deg) translateX(15px); } 100% { transform: rotate(360deg) translateX(15px); } }
        @keyframes orbitH2 { 0% { transform: rotate(360deg) translateX(22px); } 100% { transform: rotate(0deg) translateX(22px); } }
        @keyframes orbitH3 { 0% { transform: rotate(120deg) translateX(10px); } 100% { transform: rotate(480deg) translateX(10px); } }
        @keyframes pulseGlow { 0% { opacity: 0.4; filter: drop-shadow(0 0 1px #25D366); } 100% { opacity: 1; filter: drop-shadow(0 0 5px #25D366); } }
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { color: #fff; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.95rem; font-family: 'Urbanist', sans-serif; }
        nav a:hover, nav a.active { color: #FF0000; }
    </style>
    <nav>
        <a href="/" id="nav-home">E-Commerce</a>
        <a href="/calc" id="nav-calc" style="color: #00d2ff; font-weight: bold;"><i class="fa-solid fa-calculator"></i> Calculadora</a>
        <a href="/pagamento" id="nav-pay" style="color: #25D366; font-weight: bold;"><i class="fa-solid fa-credit-card"></i> Checkout</a>
    </nav>
</header>

        <div class="checkout-container">
            <div class="box-billing">
                <h3><i class="fa-solid fa-receipt"></i> Resumo Consolidado</h3>
                <div id="lista-checkout-itens" style="margin: 20px 0;"></div>
                <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:1.3rem; font-weight:bold; color:var(--rd-red); border-top:1px dashed #333; padding-top:15px;">
                    <span>TOTAL A PAGAR:</span>
                    <span id="total-checkout-val">0.00€</span>
                </div>
            </div>
            <div class="box-billing">
                <h3><i class="fa-solid fa-shield-halved"></i> Gateway de Pagamento Seguro</h3>
                <div class="form-group">
                    <label><i class="fa-solid fa-map-pin" style="color:var(--rd-red);"></i> MORADA DE DESPACHO E ENTREGA</label>
                    <input type="text" id="rd-morada" class="form-input" placeholder="Ex: Rua de Santa Catarina 400, Porto" onchange="salvarMoradaTemporaria(this.value)">
                </div>
                
                <div class="payment-methods">
                    <button class="method-btn active" id="btn-mbway" onclick="selecionarMetodo('mbway')">
                        <svg width="45" height="25" viewBox="0 0 200 100" style="fill: #25D366;"><rect width="200" height="100" rx="15" fill="#000" stroke="#222" stroke-width="4"/><text x="50%" y="65%" font-family="'Orbitron', sans-serif" font-size="32" font-weight="bold" fill="#25D366" text-anchor="middle">MB WAY</text></svg>
                        <span style="font-size: 0.75rem; letter-spacing:0.5px;">PAGAR VIA MB WAY</span>
                    </button>
                    <button class="method-btn" id="btn-card" onclick="selecionarMetodo('card')">
                        <div class="logos-row">
                            <svg width="30" height="20" viewBox="0 0 30 20"><rect width="30" height="20" rx="3" fill="#002266"/><text x="50%" y="70%" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle" font-style="italic">VISA</text></svg>
                            <svg width="30" height="20" viewBox="0 0 30 20"><rect width="30" height="20" rx="3" fill="#222"/><circle cx="11" cy="10" r="7" fill="#ff5f00" opacity="0.85"/><circle cx="19" cy="10" r="7" fill="#f4c430" opacity="0.85"/></svg>
                        </div>
                        <span style="font-size: 0.75rem; letter-spacing:0.5px;">CARTÃO CRÉDITO</span>
                    </button>
                </div>
                
                <div id="form-mbway"><div class="form-group"><label>NÚMERO DE TELEMÓVEL</label><input type="tel" id="mbway-phone" class="form-input" placeholder="912 345 678" maxlength="9"></div></div>
                <div id="form-card" style="display: none;">
                    <div class="form-group">
                        <label>DADOS DO CARTÃO DE CRÉDITO (SISTEMA ENCRIPTADO STRIPE)</label>
                        <div id="stripe-card-element"></div>
                        <div id="card-errors" role="alert" style="color: var(--rd-red); font-size: 0.85rem; margin-top: 8px; font-family:'Orbitron';"></div>
                    </div>
                </div>
                <button class="btn-pay-execute" id="submit-payment-btn" onclick="processarTransacao()">CONFIRMAR E LIQUIDAR TRANSAÇÃO</button>
            </div>
        </div>
        <script>
            document.getElementById('nav-pay').className = 'active';
            let metodoAtual = 'mbway';
            
            // Coloca aqui a tua chave pública obtida na Stripe (pk_live_...)
            const stripePublicKey = "pk_live_COLOQUE_A_SUA_CHAVE_AQUI";
            
            let stripeInstance = null; let stripeElements = null; let stripeCardInput = null;

            if (typeof Stripe !== 'undefined') {
                stripeInstance = Stripe(stripePublicKey);
                stripeElements = stripeInstance.elements();
                stripeCardInput = stripeElements.create('card', {
                    style: {
                        base: {
                            color: '#ffffff', fontFamily: '"Urbanist", sans-serif', fontSmoothing: 'antialiased', fontSize: '16px',
                            '::placeholder': { color: '#555555' }
                        },
                        invalid: { color: '#FF0000', iconColor: '#FF0000' }
                    }
                });
            }

            function carregarDadosCheckout() {
                const totalVitrine = localStorage.getItem("rd_carrinho_total") || "0.00";
                const itensExtras = JSON.parse(localStorage.getItem("rd_selecionados")) || [];
                const container = document.getElementById("lista-checkout-itens");
                const moradaSalva = localStorage.getItem("rd_morada_cliente");
                if(moradaSalva) { document.getElementById("rd-morada").value = moradaSalva; }
                if(itensExtras.length === 0) {
                    container.innerHTML = "<p style='color:#555;'>Manifesto de vitrine vazio.</p>";
                } else {
                    container.innerHTML = "";
                    itensExtras.forEach(i => {
                        container.innerHTML += '<div class="order-item"><span>• ' + i.qtd + 'x ' + i.nome + '</span><strong>' + (i.preco * i.qtd).toFixed(2) + '€</strong></div>';
                    });
                }
                document.getElementById("total-checkout-val").innerText = totalVitrine + "€";
            }
            function salvarMoradaTemporaria(valor) { localStorage.setItem("rd_morada_cliente", valor); }
            function selecionarMetodo(metodo) {
                metodoAtual = metodo;
                document.getElementById('btn-mbway').className = 'method-btn' + (metodo === 'mbway' ? ' active' : '');
                document.getElementById('btn-card').className = 'method-btn' + (metodo === 'card' ? ' active' : '');
                document.getElementById('form-mbway').style.display = metodo === 'mbway' ? 'block' : 'none';
                document.getElementById('form-card').style.display = metodo === 'card' ? 'block' : 'none';
                if(metodo === 'card' && stripeCardInput) { stripeCardInput.mount('#stripe-card-element'); }
            }
            async function processarTransacao() {
                const morada = document.getElementById("rd-morada").value;
                if(!morada) return alert("Por favor, preencha a morada de entrega.");
                const totalVitrine = localStorage.getItem("rd_carrinho_total") || "0.00";
                const btnSub = document.getElementById("submit-payment-btn");

                if (metodoAtual === 'card') {
                    if(!stripeInstance) return alert("Gateway offline.");
                    btnSub.disabled = true; btnSub.innerText = "A PROCESSAR COM CRIPTOGRAFIA STRIPE...";
                    const resposta = await fetch('/api/criar-pagamento', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ total: totalVitrine })
                    });
                    const resultadoToken = await resposta.json();
                    if(resultadoToken.error) {
                        btnSub.disabled = false; btnSub.innerText = "CONFIRMAR E LIQUIDAR TRANSAÇÃO";
                        return alert("Erro: " + resultadoToken.error);
                    }
                    const confirmacaoStripe = await stripeInstance.confirmCardPayment(resultadoToken.clientSecret, {
                        payment_method: { card: stripeCardInput }
                    });
                    if (confirmacaoStripe.error) {
                        document.getElementById('card-errors').innerText = confirmacaoStripe.error.message;
                        btnSub.disabled = false; btnSub.innerText = "CONFIRMAR E LIQUIDAR TRANSAÇÃO";
                        return;
                    }
                    alert("Pagamento via Cartão Liquidado!");
                } else {
                    const phone = document.getElementById('mbway-phone').value;
                    if(phone.length < 9) return alert("Número inválido!");
                    alert("Pedido MB WAY emitido!");
                }
                localStorage.setItem("rd_selecionados", JSON.stringify([]));
                window.location.href = "/";
            }
            carregarDadosCheckout();
        </script>
    </body>
    </html>
