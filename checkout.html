<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Checkout | RD Logistics</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/api-manager.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Urbanist'; padding: 50px; }
        .checkout-box { max-width: 600px; margin: auto; border: 1px solid #333; padding: 40px; }
        #stripe-card-element { background: #fff; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="checkout-box">
        <h1>Pagamento Seguro</h1>
        <div id="resumo-total"></div>
        <div id="stripe-card-element"></div>
        <button id="btn-pay" style="margin-top:20px; padding:15px; width:100%; background:#25D366; border:none; cursor:pointer;">CONFIRMAR PAGAMENTO</button>
    </div>

    <script>
        const stripe = Stripe("pk_live_SUA_CHAVE_AQUI");
        const elements = stripe.elements();
        const card = elements.create('card');
        card.mount('#stripe-card-element');

        document.getElementById('btn-pay').onclick = async () => {
            const total = RD_API.storage.get("rd_carrinho_total");
            const res = await fetch('/api/criar-pagamento', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ total }) 
            });
            const { clientSecret } = await res.json();
            
            const result = await stripe.confirmCardPayment(clientSecret, { payment_method: { card } });
            
            if (result.error) {
                alert(result.error.message);
            } else {
                RD_API.finalizarSessao();
                window.location.href = "sucesso.html";
            }
        };
    </script>
</body>
</html>
