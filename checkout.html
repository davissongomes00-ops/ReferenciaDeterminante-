<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Logistics | Pagamento Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --rd-red: #FF0000; --nexus-blue: #00d2ff; --dark-bg: #000000; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Urbanist', sans-serif; padding-top: 110px; }
        .checkout-container { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 40px; max-width: 1200px; margin: auto; padding: 20px; }
        .box-billing { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 30px; }
        .box-billing h3 { font-family: 'Orbitron'; margin-top: 0; color: var(--nexus-blue); border-bottom: 1px solid #1c1c1c; padding-bottom: 10px; }
        
        /* Ajuste de Métodos */
        .payment-methods { display: flex; gap: 20px; margin: 20px 0; }
        .method-btn { flex: 1; background: #0f0f0f; border: 1px solid #222; color: white; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .method-btn.active { border-color: var(--rd-red); background: rgba(255, 0, 0, 0.05); }
        .method-btn img { height: 25px; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        .method-btn span { font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: #888; font-family: 'Orbitron'; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; }
        .btn-pay-execute { width: 100%; background: #25D366; color: white; border: none; padding: 16px; border-radius: 6px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #stripe-card-element { background: #111; padding: 16px; border-radius: 6px; border: 1px solid #333; margin-top: 5px; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1c1c1c; }
    </style>
</head>
<body>

<header style="padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FF0000; background: #050505; position: fixed; top: 0; width: 100%; z-index: 1000;">
    <div style="font-family: 'Orbitron'; color: #FF0000; font-size: 22px; font-weight: bold;">RD. LOGISTICS</div>
    <nav><a href="index.html" style="color: #fff; text-decoration: none; font-family: 'Urbanist';">E-COMMERCE</a></nav>
</header>

<div class="checkout-container">
    <div class="box-billing">
        <h3><i class="fa-solid fa-receipt"></i> Resumo Consolidado</h3>
        <div id="lista-checkout-itens"></div>
        <div style="margin-top:20px; font-family:'Orbitron'; font-size:1.3rem; color:var(--rd-red); border-top:1px dashed #333; padding-top:15px;">
            TOTAL: <span id="total-checkout-val">0.00€</span>
        </div>
    </div>
    <div class="box-billing">
        <h3><i class="fa-solid fa-shield-halved"></i> Gateway Seguro</h3>
        <div class="form-group">
            <label>MORADA DE ENTREGA</label>
            <input type="text" id="rd-morada" class="form-input">
        </div>
        
        <div class="payment-methods">
            <button class="method-btn active" id="btn-mbway" onclick="selecionarMetodo('mbway')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/MB_WAY_logo.png" alt="MB WAY">
                <span>MB WAY</span>
            </button>
            <button class="method-btn" id="btn-card" onclick="selecionarMetodo('card')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="Visa" style="height:15px; margin-top:5px;">
                <span>CARTÃO CRÉDITO</span>
            </button>
        </div>
        
        <div id="form-mbway"><div class="form-group"><label>NÚMERO DE TELEMÓVEL</label><input type="tel" class="form-input" placeholder="912 345 678"></div></div>
        <div id="form-card" style="display: none;">
            <div id="stripe-card-element"></div>
            <div id="card-errors" style="color:red; margin-top:10px; font-size:0.8rem;"></div>
        </div>
        <button class="btn-pay-execute" id="submit-payment-btn" onclick="processarTransacao()">CONFIRMAR E LIQUIDAR</button>
    </div>
</div>

<script>
    const stripe = Stripe("pk_live_COLOQUE_A_SUA_CHAVE_AQUI");
    const card = stripe.elements().create('card', { style: { base: { color: '#fff', fontSize: '16px' } } });
    let metodoAtual = 'mbway';
    card.mount('#stripe-card-element');

    function carregarDados() {
        const total = localStorage.getItem("rd_carrinho_total") || "0.00";
        const itens = JSON.parse(localStorage.getItem("rd_selecionados")) || [];
        document.getElementById("lista-checkout-itens").innerHTML = itens.map(i => `<div class="order-item"><span>${i.nome}</span><strong>${(i.preco * i.qtd).toFixed(2)}€</strong></div>`).join('');
        document.getElementById("total-checkout-val").innerText = total + "€";
    }

    function selecionarMetodo(m) {
        metodoAtual = m;
        document.getElementById('btn-mbway').className = 'method-btn' + (m === 'mbway' ? ' active' : '');
        document.getElementById('btn-card').className = 'method-btn' + (m === 'card' ? ' active' : '');
        document.getElementById('form-mbway').style.display = m === 'mbway' ? 'block' : 'none';
        document.getElementById('form-card').style.display = m === 'card' ? 'block' : 'none';
    }

    async function processarTransacao() {
        const morada = document.getElementById("rd-morada").value;
        if(!morada) return alert("Morada obrigatória.");

        if (metodoAtual === 'card') {
            const res = await fetch('/api/criar-pagamento', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ total: localStorage.getItem("rd_carrinho_total") }) 
            });
            const { clientSecret } = await res.json();
            const result = await stripe.confirmCardPayment(clientSecret, { payment_method: { card } });
            if (result.error) return document.getElementById('card-errors').innerText = result.error.message;
        }
        localStorage.removeItem("rd_selecionados");
        window.location.href = "sucesso.html";
    }
    carregarDados();
</script>
</body>
</html>
